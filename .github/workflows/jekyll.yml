name: Build and Deploy Jekyll site to Pages

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Verify build output
        run: |
          echo "::group::Build summary"
          total_files=$(find _site -type f | wc -l)
          html_pages=$(find _site -name '*.html' | wc -l)
          css_files=$(find _site -name '*.css' | wc -l)
          echo "Total files: $total_files"
          echo "HTML pages:  $html_pages"
          echo "CSS files:   $css_files"
          echo "::endgroup::"

          # Verify key pages exist (baseurl puts some content under _site/blog/)
          missing=0
          for page in index.html kategorije/index.html o-nama/index.html faq/index.html mala-skola-linuxa/index.html linux-komande/index.html feed.xml; do
            if [ ! -f "_site/$page" ]; then
              echo "::error::Missing expected page: _site/$page"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then exit 1; fi

          # Verify CSS was generated
          if [ ! -f "_site/assets/css/style.css" ]; then
            echo "::error::Custom stylesheet not generated"
            exit 1
          fi

      - name: Validate HTML
        run: |
          bundle exec htmlproofer _site \
            --ignore-urls "/^http:\/\/localhost/,/^http:\/\/archive\.lugze\.org/" \
            --no-enforce-https \
            --ignore-missing-alt \
            --allow-missing-href \
            --swap-urls "^/blog:" \
            --disable-external
        continue-on-error: true

      - name: Upload artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3

  deploy:
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
